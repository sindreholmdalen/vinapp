# VinApp - Nginx configuration for Laravel Forge / DigitalOcean
# Place this in: /etc/nginx/sites-available/vinapp.no
# (Forge generates this automatically — use as reference)

server {
    listen 80;
    listen [::]:80;
    server_name vinapp.no www.vinapp.no;

    # Redirect HTTP → HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name vinapp.no www.vinapp.no;
    root /home/forge/vinapp.no/public;

    # SSL - Forge manages these automatically via Let's Encrypt
    ssl_certificate /etc/nginx/ssl/vinapp.no/server.crt;
    ssl_certificate_key /etc/nginx/ssl/vinapp.no/server.key;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_vary on;

    index index.php;

    charset utf-8;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Laravel routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Max upload size
    client_max_body_size 10M;

    # Forge logs
    access_log /var/log/nginx/vinapp.no-access.log;
    error_log /var/log/nginx/vinapp.no-error.log;
}
